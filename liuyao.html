<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#ffffff" />
    <title>六爻排盘</title>
    <style>
:root {
  --ink: #171717;
  --muted: #77736b;
  --line: #ece9e2;
  --gold: #b58a3a;
  --gold-soft: #f7ecd0;
  --paper: #fffdf9;
  --red: #bf554d;
  font-family: "Songti SC", "Noto Serif SC", "STSong", serif;
  color: var(--ink);
  background: #f5f3ee;
}

* { box-sizing: border-box; }
body { margin: 0; min-width: 320px; background: #f5f3ee; }
button, input, textarea { font: inherit; }
button { cursor: pointer; }
button:disabled { cursor: wait; opacity: .68; }

.app-shell {
  width: min(100%, 540px);
  min-height: 100vh;
  margin: 0 auto;
  background: var(--paper);
  box-shadow: 0 0 30px rgba(55, 45, 30, .08);
}

.content { padding: 18px 16px 28px; }
.page-title { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; padding: 2px 0 16px; border-bottom: 1px solid var(--line); }
.page-title h1 { margin: 0; font-size: 24px; font-weight: 600; }
.page-title span { color: var(--gold); font-size: 14px; white-space: nowrap; }
.question-row { display: flex; align-items: center; gap: 12px; padding: 14px 0; border-bottom: 1px solid var(--line); }
.question-row label { color: var(--muted); white-space: nowrap; }
.question-row input { width: 100%; border: 0; outline: 0; background: transparent; color: var(--ink); }
.question-row input::placeholder, textarea::placeholder { color: #aaa59c; }

.time-controls { display: grid; grid-template-columns: 1.45fr 1fr 1.05fr .8fr; gap: 8px; padding: 16px 0 12px; }
.time-controls label { display: grid; gap: 6px; color: var(--muted); font-size: 13px; }
.time-controls output { display: block; width: 100%; min-height: 37px; border: 1px solid var(--line); border-radius: 7px; background: #fff; color: var(--ink); padding: 8px 9px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.gua-heading { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 4px 0 12px; text-align: center; font-size: 18px; }
.gua-heading > div { padding: 10px 6px; border: 1px solid var(--line); border-radius: 8px; background: #fff; }
.gua-heading strong { font-weight: 600; }
.gua-heading small { display: block; margin-top: 5px; color: var(--muted); font-size: 12px; line-height: 1.35; }

.gua-board { border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); padding: 6px 0 4px; }
.board-legend, .yao-row { display: grid; grid-template-columns: 38px 70px minmax(0, 1fr) minmax(0, 1fr) 88px; gap: 6px; align-items: center; }
.board-legend { color: #99938a; font-size: 12px; text-align: center; padding: 0 0 5px; }
.yao-row { min-height: 68px; position: relative; border-top: 1px solid #f3efe7; }
.yao-row:first-child { border-top: 0; }
.yao-row.moving { background: linear-gradient(90deg, transparent, var(--gold-soft), transparent); }
.yao-index { display: grid; gap: 3px; color: var(--muted); font-size: 12px; text-align: center; }
.yao-index b { color: var(--ink); font-size: 14px; font-weight: 500; }
.hidden-cell { min-width: 0; color: var(--muted); font-size: 12px; line-height: 1.35; text-align: center; }
.hidden-cell strong { display: block; color: var(--red); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.hidden-cell span { display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.gua-cell { display: grid; grid-template-columns: 58px 1fr; gap: 7px; align-items: center; min-width: 0; }
.line-wrap { display: flex; align-items: center; justify-content: center; gap: 5px; min-width: 0; }
.solid, .broken { display: inline-block; width: 54px; height: 11px; background: #0e0e0e; }
.broken { display: flex; gap: 12px; background: transparent; }
.broken::before, .broken::after { content: ""; flex: 1; background: #0e0e0e; }
.changing { width: 14px; color: var(--gold); font-size: 19px; font-family: Arial, sans-serif; line-height: 1; }
.yao-text { min-width: 0; font-size: 13px; line-height: 1.35; }
.yao-text strong { display: block; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.yao-text span { display: block; color: var(--red); font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.relation { display: flex; flex-wrap: wrap; gap: 4px; justify-content: center; }
.tag { display: inline-block; padding: 2px 5px; border-radius: 5px; background: #f4f1ea; color: #4d4942; font-size: 11px; line-height: 1.3; }
.tag.hot { background: #f9e5df; color: var(--red); }
.tag.good { background: #f5ebcf; color: #8c661e; }
.tag.neutral { color: #8a857b; }
.yao-row[data-state="empty"] .line-wrap { opacity: .18; }

.roll-panel { display: flex; align-items: center; justify-content: space-between; gap: 14px; margin: 20px 0; padding: 15px 16px; border: 1px solid #eadfc6; border-radius: 12px; background: #fffaf0; }
.roll-title, .roll-subtitle { margin: 0; }
.roll-title { font-size: 17px; }
.roll-subtitle { margin-top: 5px; color: var(--muted); font-size: 12px; }
.coin-tray { display: flex; align-items: center; gap: 8px; margin-top: 10px; }
.coin { position: relative; display: inline-grid; place-items: center; width: 40px; height: 40px; border-radius: 50%; background: radial-gradient(circle at 35% 30%, #fff4cf 0 14%, #d1a14e 58%, #81591d 100%); border: 2px solid #9a6b24; box-shadow: inset 0 1px 2px rgba(255,255,255,.7), inset 0 -2px 4px rgba(73, 43, 8, .35), 0 3px 7px rgba(74, 54, 19, .2); transform-style: preserve-3d; }
.coin::before { content: ""; position: absolute; inset: 4px; border: 1px solid rgba(99, 61, 13, .55); border-radius: 50%; }
.coin.back { background: radial-gradient(circle at 35% 30%, #f4e7c8 0 14%, #a97835 58%, #593812 100%); border-color: #704715; }
.coin.idle { background: radial-gradient(circle at 35% 30%, #fffaf0 0 18%, #ead9ae 60%, #b88d45 100%); border-color: #d3b06a; box-shadow: inset 0 1px 2px rgba(255,255,255,.75); opacity: .72; }
.coin.rolling { animation: coinFlip .62s cubic-bezier(.25, .75, .3, 1) infinite; }
.coin.delay-one { animation-delay: .09s; }
.coin.delay-two { animation-delay: .18s; }
.coin.settled { animation: coinSettle .22s ease-out both; }
.coin-hole { position: relative; z-index: 1; display: block; width: 12px; height: 12px; border: 1px solid rgba(75, 45, 12, .72); background: var(--paper); box-shadow: inset 0 1px 2px rgba(0,0,0,.25); }
.coin.back .coin-hole { background: #2f210f; border-color: rgba(255, 229, 169, .5); }
.coin.idle .coin-hole { background: #fffaf0; }
.coin-tray em { margin-left: 4px; color: var(--muted); font-style: normal; font-size: 12px; }
.roll-actions { display: grid; gap: 8px; }
.primary-button, .secondary-button, .tertiary-button { border: 0; border-radius: 8px; padding: 10px 16px; white-space: nowrap; }
.primary-button { background: var(--gold); color: white; }
.secondary-button { background: #efe9dc; color: #514935; }
.tertiary-button { background: #fff; color: #7b6129; border: 1px solid #e0cf9e; }
.tertiary-button:disabled { color: #aaa197; border-color: #eee7d8; background: #faf8f2; }
.hidden { display: none; }

.summary { margin-top: 16px; padding: 12px 14px; border: 1px solid var(--line); border-radius: 8px; background: #fff; }
.summary p { margin: 0; color: #4f4b44; font-size: 14px; line-height: 1.65; }
.toast { position: fixed; left: 50%; bottom: 28px; transform: translate(-50%, 20px); opacity: 0; pointer-events: none; padding: 10px 15px; color: white; background: rgba(20,20,20,.82); border-radius: 7px; transition: .25s ease; font-family: system-ui, sans-serif; font-size: 13px; }
.toast.show { transform: translate(-50%, 0); opacity: 1; }

@keyframes coinFlip {
  0% { transform: translateY(0) rotateX(0) rotateZ(0); }
  45% { transform: translateY(-10px) rotateX(540deg) rotateZ(22deg); }
  100% { transform: translateY(0) rotateX(1080deg) rotateZ(0); }
}

@keyframes coinSettle {
  0% { transform: translateY(-5px) scale(.94); opacity: .72; }
  100% { transform: translateY(0) scale(1); opacity: 1; }
}

@media (prefers-reduced-motion: reduce) {
  .coin.rolling, .coin.settled { animation-duration: .01ms; animation-iteration-count: 1; }
}

@media (max-width: 390px) {
  .content { padding-left: 12px; padding-right: 12px; }
  .time-controls { grid-template-columns: 1fr 1fr; }
  .time-controls label:first-child { grid-column: 1 / 3; }
  .board-legend, .yao-row { grid-template-columns: 34px 64px minmax(0, 1fr) minmax(0, 1fr); }
  .board-legend span:nth-child(5), .relation { grid-column: 3 / 5; }
  .relation { justify-content: flex-start; padding: 0 0 8px; }
  .gua-cell { grid-template-columns: 50px 1fr; }
  .solid, .broken { width: 44px; }
  .roll-panel { align-items: stretch; flex-direction: column; }
  .roll-actions { grid-template-columns: 1fr 1fr; }
}

</style>
  </head>
  <body>
    <main class="app-shell">
      <section class="content">
        <header class="page-title">
          <h1>六爻排盘</h1>
          <span>硬币起卦</span>
        </header>

        <div class="question-row">
          <label for="question">占问</label>
          <input id="question" type="text" placeholder="记录这次占问，例如：项目能否顺利推进" />
        </div>

        <section class="time-controls" aria-label="排盘时间">
          <label>起卦时间<output id="startTime">未起卦</output></label>
          <label>年月<output id="yearMonthInfo">待定</output></label>
          <label>日辰/旬空<output id="dayInfo">待定</output></label>
          <label>时辰<output id="hourInfo">待定</output></label>
          <output id="yearStem" hidden>甲</output>
          <output id="yearBranch" hidden>子</output>
          <output id="monthStem" hidden>丙</output>
          <output id="monthBranch" hidden>寅</output>
          <output id="dayBranch" hidden>丑</output>
          <output id="dayStem" hidden>丁</output>
          <output id="hourStem" hidden>甲</output>
          <output id="hourBranch" hidden>子</output>
          <output id="emptyBranches" hidden>子丑</output>
        </section>

        <section class="gua-heading">
          <div>本卦：<strong id="primaryName">待排卦</strong><small id="primaryMeta">摇满六爻后生成</small></div>
          <div>变卦：<strong id="changedName">待排卦</strong><small id="changedMeta">动爻变化后生成</small></div>
        </section>

        <section class="gua-board" aria-label="六爻排盘">
          <div class="board-legend"><span>爻位</span><span>伏神</span><span>本卦</span><span>变卦</span><span>日月</span></div>
          <div id="yaoBoard"></div>
        </section>

        <section class="roll-panel">
          <div>
            <p class="roll-title" id="rollTitle">准备开始摇卦</p>
            <p class="roll-subtitle" id="rollSubtitle">六爻从初爻开始，由下往上记录</p>
            <div class="coin-tray" id="coinTray" aria-label="硬币结果"><span>—</span><span>—</span><span>—</span><em>未摇</em></div>
          </div>
          <div class="roll-actions">
            <button class="primary-button" id="rollButton" type="button">摇一爻</button>
            <button class="secondary-button hidden" id="newButton" type="button">重新起卦</button>
            <button class="tertiary-button" id="copyButton" type="button" disabled>复制卦例</button>
          </div>
        </section>

        <section class="summary">
          <p id="summaryLine">未起卦。先摇满六爻，再查看本卦、变卦、动爻及日月作用。</p>
        </section>
      </section>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

  丙: ["朱雀", "勾陈", "螣蛇", "白虎", "玄武", "青龙"],
  丁: ["朱雀", "勾陈", "螣蛇", "白虎", "玄武", "青龙"],
  戊: ["勾陈", "螣蛇", "白虎", "玄武", "青龙", "朱雀"],
  己: ["螣蛇", "白虎", "玄武", "青龙", "朱雀", "勾陈"],
  庚: ["白虎", "玄武", "青龙", "朱雀", "勾陈", "螣蛇"],
  辛: ["白虎", "玄武", "青龙", "朱雀", "勾陈", "螣蛇"],
  壬: ["玄武", "青龙", "朱雀", "勾陈", "螣蛇", "白虎"],
  癸: ["玄武", "青龙", "朱雀", "勾陈", "螣蛇", "白虎"]
};

const state = { yaos: [], lastCoins: null, isRolling: false, startedAt: null };
const $ = (selector) => document.querySelector(selector);

function setOutputValue(id, value) {
  const output = $(`#${id}`);
  output.value = value;
  output.textContent = value;
}

function mod(value, size) {
  return ((value % size) + size) % size;
}

function solarTermDate(year, termIndex) {
  return new Date(31556925974.7 * (year - 1900) + SOLAR_TERM_INFO[termIndex] * 60000 + Date.UTC(1900, 0, 6, 2, 5));
}

function monthBranchFromDate(date) {
  const year = date.getFullYear();
  let branch = "子";

  for (const item of MONTH_BUILDERS) {
    if (date >= solarTermDate(year, item.term)) branch = item.branch;
  }

  return branch;
}

function sexagenaryFromIndex(index) {
  const normalized = mod(index, 60);
  return {
    stem: STEMS[normalized % 10],
    branch: BRANCHES[normalized % 12]
  };
}

function sexagenaryIndex(stem, branch) {
  for (let index = 0; index < 60; index += 1) {
    if (STEMS[index % 10] === stem && BRANCHES[index % 12] === branch) return index;
  }
  return 0;
}

function yearGanZhiFromDate(date) {
  const gregorianYear = date.getFullYear();
  const solarYear = date >= solarTermDate(gregorianYear, 2) ? gregorianYear : gregorianYear - 1;
  return sexagenaryFromIndex(solarYear - 1984);
}

function monthGanZhiFromDate(date) {
  const year = yearGanZhiFromDate(date);
  const branch = monthBranchFromDate(date);
  const startStem = MONTH_START_STEM[year.stem];
  const offset = MONTH_OFFSET_FROM_YIN[branch];
  return {
    stem: STEMS[(startStem + offset) % 10],
    branch
  };
}

function dayGanZhiFromDate(date) {
  const day = new Date(date.getFullYear(), date.getMonth(), date.getDate());
  const base = new Date(2000, 0, 1);
  const diffDays = Math.round((day - base) / 86400000);
  const stem = STEMS[mod(4 + diffDays, 10)];
  const branch = BRANCHES[mod(6 + diffDays, 12)];
  return { stem, branch };
}

function hourGanZhiFromDate(date, dayStem) {
  const branchIndex = Math.floor((date.getHours() + 1) / 2) % 12;
  const startStem = HOUR_START_STEM[dayStem];
  return {
    stem: STEMS[(startStem + branchIndex) % 10],
    branch: BRANCHES[branchIndex]
  };
}

function emptyBranchesFromDay(day) {
  const dayIndex = sexagenaryIndex(day.stem, day.branch);
  const xunStart = dayIndex - (dayIndex % 10);
  return [BRANCHES[(xunStart + 10) % 12], BRANCHES[(xunStart + 11) % 12]];
}

function formatDateTime(date) {
  const pad = (value) => String(value).padStart(2, "0");
  return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())} ${pad(date.getHours())}:${pad(date.getMinutes())}`;
}

function applyTimeInfo(date) {
  const year = yearGanZhiFromDate(date);
  const month = monthGanZhiFromDate(date);
  const day = dayGanZhiFromDate(date);
  const hour = hourGanZhiFromDate(date, day.stem);
  const empties = emptyBranchesFromDay(day);
  setOutputValue("startTime", formatDateTime(date));
  setOutputValue("yearMonthInfo", `${year.stem}${year.branch}年 ${month.stem}${month.branch}月`);
  setOutputValue("dayInfo", `${day.stem}${day.branch}日（${empties.join("")}空）`);
  setOutputValue("hourInfo", `${hour.stem}${hour.branch}时`);
  setOutputValue("yearStem", year.stem);
  setOutputValue("yearBranch", year.branch);
  setOutputValue("monthStem", month.stem);
  setOutputValue("monthBranch", month.branch);
  setOutputValue("dayBranch", day.branch);
  setOutputValue("dayStem", day.stem);
  setOutputValue("hourStem", hour.stem);
  setOutputValue("hourBranch", hour.branch);
  setOutputValue("emptyBranches", empties.join(""));
}

function resetTimeInfo() {
  setOutputValue("startTime", "未起卦");
  setOutputValue("yearMonthInfo", "待定");
  setOutputValue("dayInfo", "待定");
  setOutputValue("hourInfo", "待定");
  setOutputValue("yearStem", "甲");
  setOutputValue("yearBranch", "子");
  setOutputValue("monthStem", "丙");
  setOutputValue("monthBranch", "寅");
  setOutputValue("dayStem", "甲");
  setOutputValue("dayBranch", "子");
  setOutputValue("hourStem", "甲");
  setOutputValue("hourBranch", "子");
  setOutputValue("emptyBranches", "戌亥");
}

function isGenerating(elementA, elementB) {
  return ELEMENT_CYCLE[(ELEMENT_CYCLE.indexOf(elementA) + 1) % ELEMENT_CYCLE.length] === elementB;
}

function relationToSelf(palaceElement, yaoElement) {
  if (palaceElement === yaoElement) return "兄弟";
  if (isGenerating(yaoElement, palaceElement)) return "父母";
  if (isGenerating(palaceElement, yaoElement)) return "子孙";
  if (CONTROLS[yaoElement] === palaceElement) return "官鬼";
  if (CONTROLS[palaceElement] === yaoElement) return "妻财";
  return "六亲";
}

function elementRelation(source, target) {
  if (!source || !target) return "unknown";
  if (source === target) return "same";
  if (isGenerating(source, target)) return "generates";
  if (CONTROLS[source] === target) return "controls";
  if (isGenerating(target, source)) return "drains";
  if (CONTROLS[target] === source) return "controlled_by";
  return "neutral";
}

function elementAction(actorBranch, targetBranch, prefix) {
  const actor = ELEMENT_OF_BRANCH[actorBranch];
  const target = ELEMENT_OF_BRANCH[targetBranch];
  const tags = [];

  if (actorBranch === targetBranch) tags.push({ text: `${prefix}临`, tone: "good" });
  if (COMBINES[actorBranch] === targetBranch) tags.push({ text: `${prefix}合`, tone: "good" });
  if (CLASHES[actorBranch] === targetBranch) tags.push({ text: prefix === "月" ? "月破" : `${prefix}冲`, tone: "hot" });

  if (actor === target) tags.push({ text: `${prefix}扶`, tone: "good" });
  else if (isGenerating(actor, target)) tags.push({ text: `${prefix}生`, tone: "good" });
  else if (CONTROLS[actor] === target) tags.push({ text: `${prefix}克`, tone: "hot" });

  return tags;
}

function dateContext() {
  return {
    monthBranch: $("#monthBranch").value,
    dayBranch: $("#dayBranch").value,
    emptyBranches: ($("#emptyBranches").value || "").split("").filter((branch) => BRANCHES.includes(branch))
  };
}

function branchStatusTags(branch, context = dateContext()) {
  const tags = [];
  if (context.emptyBranches.includes(branch)) tags.push({ text: "旬空", tone: "hot" });
  tags.push(...elementAction(context.monthBranch, branch, "月"));
  tags.push(...elementAction(context.dayBranch, branch, "日"));
  return tags;
}

function branchStatusText(branch, context = dateContext()) {
  return branchStatusTags(branch, context).map((tag) => tag.text).filter((text, index, list) => list.indexOf(text) === index).join("、");
}

function transformStatusTags(primary, changed, context = dateContext()) {
  const tags = [];
  const relation = elementRelation(changed.element, primary.element);
  if (relation === "generates") tags.push("化回头生");
  else if (relation === "controls") tags.push("化回头克");
  else if (relation === "same") tags.push("化比扶");
  else if (relation === "drains") tags.push("化泄");
  else if (relation === "controlled_by") tags.push("化受克");

  if (changed.branch === primary.branch) tags.push("化伏吟");
  if (CLASHES[changed.branch] === primary.branch) tags.push("化冲");
  if (context.emptyBranches.includes(changed.branch)) tags.push("化空");

  return tags;
}

function hexagramBond(rows) {
  const pairs = [[0, 3], [1, 4], [2, 5]];
  if (pairs.every(([lower, upper]) => COMBINES[rows[lower].branch] === rows[upper].branch)) return "六合";
  if (pairs.every(([lower, upper]) => CLASHES[rows[lower].branch] === rows[upper].branch)) return "六冲";
  return "";
}

function bitForYao(value, changed = false) {
  const isYang = value === 7 || value === 9;
  return changed && (value === 6 || value === 9) ? !isYang : isYang;
}

function keyFromYaos(values, changed = false) {
  return values.map((value) => bitForYao(value, changed) ? "1" : "0").reverse().join("");
}

function trigramNamesFromKey(key) {
  const upper = TRIGRAMS[key.slice(0, 3)].name;
  const lower = TRIGRAMS[key.slice(3, 6)].name;
  return { upper, lower };
}

function palaceInfo(name) {
  for (const [palace, names] of Object.entries(PALACE_SETS)) {
    const stage = names.indexOf(name);
    if (stage !== -1) {
      return {
        palace,
        stage,
        element: PALACE_ELEMENTS[palace],
        world: WORLD_BY_STAGE[stage],
        response: RESPONSE_BY_STAGE[stage],
        label: stage === 0 ? "本宫" : stage === 6 ? "游魂" : stage === 7 ? "归魂" : `${stage}世`
      };
    }
  }
  return { palace: "?", stage: 0, element: "土", world: 6, response: 3, label: "" };
}

function naJiaRows(key, palaceElement) {
  const names = trigramNamesFromKey(key);
  const lower = NA_JIA[names.lower].lower;
  const upper = NA_JIA[names.upper].upper;
  return [...lower, ...upper].map((item) => {
    const element = ELEMENT_OF_BRANCH[item.branch];
    return {
      ...item,
      element,
      family: relationToSelf(palaceElement, element)
    };
  });
}

function hiddenRowsFor(primaryRows, primaryPalace) {
  const presentFamilies = new Set(primaryRows.map((row) => row.family));
  const missingFamilies = SIX_RELATIVES.filter((family) => !presentFamilies.has(family));
  if (!missingFamilies.length) return primaryRows.map(() => null);

  const homeName = PALACE_SETS[primaryPalace.palace][0];
  const homeKey = KEY_BY_GUA_NAME[homeName];
  const homeRows = naJiaRows(homeKey, primaryPalace.element);
  return homeRows.map((row, index) => missingFamilies.includes(row.family) ? {
    ...row,
    lineIndex: index + 1,
    flying: primaryRows[index]
  } : null);
}

function rollYao() {
  const coins = [0, 0, 0].map(() => Math.random() > 0.5 ? { text: "乾", value: 3, side: "front" } : { text: "坤", value: 2, side: "back" });
  return {
    coins,
    value: coins.reduce((sum, coin) => sum + coin.value, 0)
  };
}

function lineClass(value, changed = false) {
  return bitForYao(value, changed) ? "solid" : "broken";
}

function changingMark(value) {
  if (value === 9) return "○";
  if (value === 6) return "×";
  return "";
}

function yaoName(value) {
  return ({ 6: "老阴", 7: "少阳", 8: "少阴", 9: "老阳" })[value] || "待摇";
}

function renderCoinTray(result = state.lastCoins) {
  const tray = $("#coinTray");
  if (state.isRolling) {
    tray.innerHTML = `
      ${coinHTML({ text: "铜钱", value: "", side: "front" }, "rolling")}
      ${coinHTML({ text: "铜钱", value: "", side: "front" }, "rolling delay-one")}
      ${coinHTML({ text: "铜钱", value: "", side: "front" }, "rolling delay-two")}
      <em>摇动中</em>
    `;
    return;
  }
  if (!result) {
    tray.innerHTML = `
      ${coinHTML({ text: "铜钱", value: "", side: "idle" }, "idle")}
      ${coinHTML({ text: "铜钱", value: "", side: "idle" }, "idle")}
      ${coinHTML({ text: "铜钱", value: "", side: "idle" }, "idle")}
      <em>未摇</em>
    `;
    return;
  }
  const detail = result.coins.map((coin) => `${coin.text}${coin.value}`).join(" ");
  tray.innerHTML = `${result.coins.map((coin) => coinHTML(coin, "settled")).join("")}<em>${detail}｜${result.value}：${yaoName(result.value)}</em>`;
}

function coinHTML(coin, extraClass = "") {
  const valueText = coin.value ? coin.value : "";
  return `
    <span class="coin ${coin.side} ${extraClass}" aria-label="${coin.text}${valueText}">
      <span class="coin-hole"></span>
    </span>
  `;
}

function wait(ms) {
  return new Promise((resolve) => window.setTimeout(resolve, ms));
}

function renderNames() {
  if (state.yaos.length !== 6) {
    $("#primaryName").textContent = "待排卦";
    $("#changedName").textContent = "待排卦";
    $("#primaryMeta").textContent = `已摇 ${state.yaos.length}/6`;
    $("#changedMeta").textContent = "动爻变化后生成";
    $("#summaryLine").textContent = "未起卦。先摇满六爻，再查看本卦、变卦、动爻及日月作用。";
    return null;
  }

  const primaryKey = keyFromYaos(state.yaos);
  const changedKey = keyFromYaos(state.yaos, true);
  const primaryName = GUA_NAMES[primaryKey] || "未知卦";
  const changedName = GUA_NAMES[changedKey] || "未知卦";
  const primaryPalace = palaceInfo(primaryName);
  const changedPalace = palaceInfo(changedName);
  const primaryRows = naJiaRows(primaryKey, primaryPalace.element);
  const changedRows = naJiaRows(changedKey, primaryPalace.element);
  const primaryBond = hexagramBond(primaryRows);
  const changedBond = hexagramBond(changedRows);
  const moving = state.yaos.map((value, index) => value === 6 || value === 9 ? POSITION_LABELS[index] : null).filter(Boolean);

  $("#primaryName").textContent = primaryName;
  $("#changedName").textContent = changedName;
  $("#primaryMeta").textContent = `${primaryPalace.palace}宫${primaryPalace.element}｜${primaryPalace.label}${primaryBond ? `｜${primaryBond}` : ""}`;
  $("#changedMeta").textContent = `${changedPalace.palace}宫${changedPalace.element}${changedBond ? `｜${changedBond}` : ""}｜动爻：${moving.length ? moving.join("、") : "无"}`;
  $("#summaryLine").textContent = `本卦 ${primaryName}，变卦 ${changedName}。${$("#yearMonthInfo").value} ${$("#dayInfo").value}，起卦时间：${$("#startTime").value}。`;

  return { primaryKey, changedKey, primaryPalace, changedPalace, primaryRows, changedRows, primaryBond, changedBond };
}

function renderYaoCell(row, value, changed = false, markers = []) {
  const mark = changed ? "" : changingMark(value);
  const status = branchStatusText(row.branch);
  const markerText = markers.length ? `｜${markers.join("")}` : "";
  return `
    <div class="gua-cell">
      <div class="line-wrap"><span class="${lineClass(value, changed)}"></span><span class="changing">${mark}</span></div>
      <div class="yao-text">
        <strong>${row.family}${row.branch}${row.element}${markerText}</strong>
        <span>${row.stem}${row.branch}｜${changed ? "变爻" : yaoName(value)}${status ? `｜${status}` : ""}</span>
      </div>
    </div>
  `;
}

function renderHiddenCell(row) {
  if (!row) return `<div class="hidden-cell"><strong>—</strong><span>无伏</span></div>`;
  const status = branchStatusText(row.branch);
  return `<div class="hidden-cell"><strong>${row.family}${row.branch}${row.element}</strong><span>${row.stem}${row.branch}伏${status ? `｜${status}` : ""}</span></div>`;
}

function renderRelations(branch) {
  const tags = branchStatusTags(branch);
  if (!tags.length) tags.push({ text: "无", tone: "neutral" });
  const deduped = tags.filter((tag, index, list) => list.findIndex((item) => item.text === tag.text) === index);
  return `<div class="relation">${deduped.map((tag) => `<span class="tag ${tag.tone}">${tag.text}</span>`).join("")}</div>`;
}

function lineText(value, changed = false) {
  const line = bitForYao(value, changed) ? "━━━" : "━　━";
  const mark = changed ? "" : changingMark(value);
  return `${line}${mark}`;
}

function lineMarkers(index, primaryPalace) {
  const markers = [];
  if (index + 1 === primaryPalace.world) markers.push("世");
  if (index + 1 === primaryPalace.response) markers.push("应");
  return markers;
}

function formatRowText(row, context = dateContext()) {
  const status = branchStatusText(row.branch, context);
  return `${row.family}${row.branch}${row.element}（${row.stem}${row.branch}${status ? `｜${status}` : ""}）`;
}

function formatHiddenText(row, context = dateContext()) {
  if (!row) return "　";
  return `${formatRowText(row, context)}伏`;
}

function describeHiddenRows(hiddenRows, context = dateContext()) {
  const rows = hiddenRows.filter(Boolean);
  if (!rows.length) return "无";
  return rows.map((row) => {
    const position = POSITION_LABELS[row.lineIndex - 1];
    const flying = `${row.flying.family}${row.flying.branch}${row.flying.element}`;
    return `${formatRowText(row, context)}伏于${position}爻${flying}下`;
  }).join("；");
}

function describeMovingLines(primaryRows, changedRows, context = dateContext()) {
  const details = state.yaos.map((value, index) => {
    if (value !== 6 && value !== 9) return null;
    const position = POSITION_LABELS[index];
    const primary = primaryRows[index];
    const changed = changedRows[index];
    const transform = transformStatusTags(primary, changed, context).join("、") || "动变";
    return `${position}爻${yaoName(value)}${changingMark(value)}：${primary.family}${primary.branch}${primary.element}化${changed.family}${changed.branch}${changed.element}（${transform}）`;
  }).filter(Boolean);
  return details.length ? details.join("；") : "无动爻";
}

function buildCaseText() {
  if (state.yaos.length !== 6) return "";

  const primaryKey = keyFromYaos(state.yaos);
  const changedKey = keyFromYaos(state.yaos, true);
  const primaryName = GUA_NAMES[primaryKey] || "未知卦";
  const changedName = GUA_NAMES[changedKey] || "未知卦";
  const primaryPalace = palaceInfo(primaryName);
  const changedPalace = palaceInfo(changedName);
  const primaryRows = naJiaRows(primaryKey, primaryPalace.element);
  const changedRows = naJiaRows(changedKey, primaryPalace.element);
  const hiddenRows = hiddenRowsFor(primaryRows, primaryPalace);
  const primaryBond = hexagramBond(primaryRows);
  const changedBond = hexagramBond(changedRows);
  const spirits = SPIRIT_START[$("#dayStem").value];
  const moving = state.yaos.map((value, index) => value === 6 || value === 9 ? POSITION_LABELS[index] : null).filter(Boolean);
  const context = dateContext();
  const question = $("#question").value.trim() || "未填写";
  const yearGanZhi = `${$("#yearStem").value}${$("#yearBranch").value}`;
  const monthGanZhi = `${$("#monthStem").value}${$("#monthBranch").value}`;
  const dayGanZhi = `${$("#dayStem").value}${$("#dayBranch").value}`;
  const hourGanZhi = `${$("#hourStem").value}${$("#hourBranch").value}`;
  const emptyBranches = $("#emptyBranches").value;
  const worldRow = primaryRows[primaryPalace.world - 1];
  const responseRow = primaryRows[primaryPalace.response - 1];

  const lines = [
    "六爻卦例",
    `占问：${question}`,
    `起卦时间：${$("#startTime").value}`,
    `干支：${yearGanZhi}年　${monthGanZhi}月　${dayGanZhi}日　${hourGanZhi}时（${emptyBranches}空）`,
    `月建：${$("#monthBranch").value}　日辰：${$("#dayBranch").value}　旬空：${emptyBranches}`,
    `本卦：${primaryName}（${primaryPalace.palace}宫${primaryPalace.element}｜${primaryPalace.label}${primaryBond ? `｜${primaryBond}` : ""}）`,
    `变卦：${changedName}（${changedPalace.palace}宫${changedPalace.element}${changedBond ? `｜${changedBond}` : ""}｜动爻：${moving.length ? moving.join("、") : "无"}）`,
    `世爻：${formatRowText(worldRow, context)}　应爻：${formatRowText(responseRow, context)}`,
    `伏神：${describeHiddenRows(hiddenRows, context)}`,
    `动变：${describeMovingLines(primaryRows, changedRows, context)}`,
    `取用提示：用神需按占问审题另取；本卦例先完整列出排盘结构。`,
    ""
  ];

  lines.push("伏神\t六神\t爻位\t本卦\t爻象\t变卦\t变象\t动变");
  for (let index = 5; index >= 0; index -= 1) {
    const markers = lineMarkers(index, primaryPalace);
    const position = `${POSITION_LABELS[index]}${markers.join("")}`;
    const primary = primaryRows[index];
    const changed = changedRows[index];
    const hidden = hiddenRows[index];
    const transform = state.yaos[index] === 6 || state.yaos[index] === 9 ? transformStatusTags(primary, changed, context).join("、") : "";
    const primaryText = `${formatRowText(primary, context)}${markers.length ? ` ${markers.join("")}` : ""}`;
    lines.push(`${formatHiddenText(hidden, context)}\t${spirits[index]}\t${position}\t${primaryText}\t${lineText(state.yaos[index])}\t${formatRowText(changed, context)}\t${lineText(state.yaos[index], true)}\t${transform}`);
  }

  return lines.join("\n");
}

async function copyText(text) {
  if (navigator.clipboard && window.isSecureContext) {
    await navigator.clipboard.writeText(text);
    return;
  }

  const textarea = document.createElement("textarea");
  textarea.value = text;
  textarea.setAttribute("readonly", "");
  textarea.style.position = "fixed";
  textarea.style.left = "-9999px";
  document.body.appendChild(textarea);
  textarea.select();
  document.execCommand("copy");
  document.body.removeChild(textarea);
}

function renderBoard(context) {
  const board = $("#yaoBoard");
  board.innerHTML = "";

  const complete = state.yaos.length === 6 && context;
  const primaryRows = complete ? context.primaryRows : null;
  const changedRows = complete ? context.changedRows : null;
  const hiddenRows = complete ? hiddenRowsFor(primaryRows, context.primaryPalace) : null;
  const spirits = SPIRIT_START[$("#dayStem").value];

  for (let index = 5; index >= 0; index -= 1) {
    const value = state.yaos[index];
    const filled = value !== undefined;
    const moving = value === 6 || value === 9;
    const row = document.createElement("div");
    row.className = `yao-row ${moving ? "moving" : ""}`;
    row.dataset.state = filled ? "filled" : "empty";

    if (!complete) {
      row.innerHTML = `
        <span class="yao-index"><b>${POSITION_LABELS[index]}</b><span>${spirits[index]}</span></span>
        <div class="hidden-cell"><strong>—</strong><span>待排</span></div>
        <div class="gua-cell"><div class="line-wrap"><span class="${filled ? lineClass(value) : "solid"}"></span><span class="changing">${filled ? changingMark(value) : ""}</span></div><div class="yao-text"><strong>${filled ? yaoName(value) : "待摇"}</strong><span>${filled ? `${value} 点` : "从初爻开始"}</span></div></div>
        <div class="gua-cell"><div class="line-wrap"><span class="${filled ? lineClass(value, true) : "solid"}"></span><span class="changing"></span></div><div class="yao-text"><strong>待排</strong><span>摇满六爻生成</span></div></div>
        <div class="relation"><span class="tag neutral">待排</span></div>
      `;
    } else {
      const markers = lineMarkers(index, context.primaryPalace);
      row.innerHTML = `
        <span class="yao-index"><b>${POSITION_LABELS[index]}${markers.join("")}</b><span>${spirits[index]}</span></span>
        ${renderHiddenCell(hiddenRows[index])}
        ${renderYaoCell(primaryRows[index], value, false, markers)}
        ${renderYaoCell(changedRows[index], value, true)}
        ${renderRelations(primaryRows[index].branch)}
      `;
    }
    board.appendChild(row);
  }
}

function renderAll() {
  renderCoinTray();
  const context = renderNames();
  renderBoard(context);
}

function showToast(message) {
  const toast = $("#toast");
  toast.textContent = message;
  toast.classList.add("show");
  window.setTimeout(() => toast.classList.remove("show"), 2200);
}

function saveHistory() {
  if (state.yaos.length !== 6) return;
  const history = JSON.parse(localStorage.getItem("liuyao-history") || "[]");
  history.unshift({
    question: $("#question").value.trim(),
    yaos: [...state.yaos],
    startedAt: state.startedAt ? state.startedAt.toISOString() : new Date().toISOString(),
    yearStem: $("#yearStem").value,
    yearBranch: $("#yearBranch").value,
    monthStem: $("#monthStem").value,
    monthBranch: $("#monthBranch").value,
    dayBranch: $("#dayBranch").value,
    dayStem: $("#dayStem").value,
    hourStem: $("#hourStem").value,
    hourBranch: $("#hourBranch").value,
    emptyBranches: $("#emptyBranches").value,
    createdAt: new Date().toISOString()
  });
  localStorage.setItem("liuyao-history", JSON.stringify(history.slice(0, 30)));
}

function resetGua() {
  state.yaos = [];
  state.lastCoins = null;
  state.isRolling = false;
  state.startedAt = null;
  resetTimeInfo();
  $("#rollTitle").textContent = "准备开始摇卦";
  $("#rollSubtitle").textContent = "六爻从初爻开始，由下往上记录";
  $("#rollButton").disabled = false;
  $("#rollButton").classList.remove("hidden");
  $("#newButton").classList.add("hidden");
  $("#copyButton").disabled = true;
  renderAll();
}

$("#rollButton").addEventListener("click", async () => {
  if (state.yaos.length >= 6 || state.isRolling) return;
  if (!state.startedAt) {
    state.startedAt = new Date();
    applyTimeInfo(state.startedAt);
  }
  const result = rollYao();
  state.isRolling = true;
  $("#rollButton").disabled = true;
  $("#rollTitle").textContent = `正在摇第 ${state.yaos.length + 1} 爻`;
  $("#rollSubtitle").textContent = "三枚硬币落定后记入爻盘";
  renderCoinTray();
  await wait(680);

  state.isRolling = false;
  state.lastCoins = result;
  state.yaos.push(result.value);
  $("#rollButton").disabled = false;
  renderAll();

  const count = state.yaos.length;
  if (count === 6) {
    $("#rollTitle").textContent = "排盘完成";
    $("#rollSubtitle").textContent = "本卦、变卦和日月对爻作用已列出";
    $("#rollButton").classList.add("hidden");
    $("#newButton").classList.remove("hidden");
    $("#copyButton").disabled = false;
    saveHistory();
    showToast("六爻完成，已保存到本机");
  } else {
    $("#rollTitle").textContent = `第 ${count} 爻已记录：${result.value} 点`;
    $("#rollSubtitle").textContent = `还需要摇 ${6 - count} 爻，从下往上排盘`;
  }
});

$("#newButton").addEventListener("click", resetGua);

$("#copyButton").addEventListener("click", async () => {
  const text = buildCaseText();
  if (!text) {
    showToast("摇满六爻后才能复制");
    return;
  }

  try {
    await copyText(text);
    showToast("卦例已复制");
  } catch (error) {
    showToast("复制失败，请长按页面内容手动复制");
  }
});

resetGua();

</script>
  </body>
</html>
